<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TabbyAnnounce</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0F172A;
    --surface:     #1E293B;
    --surface2:    #334155;
    --border:      #475569;
    --fg:          #F8FAFC;
    --muted:       #94A3B8;
    --accent:      #22C55E;
    --accent-dim:  #16A34A;
    --danger:      #EF4444;
    --danger-dim:  #B91C1C;
    --warn:        #F59E0B;
    --radius:      4px;
    --font:        'Space Mono', 'Courier New', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── Layout ── */
  .shell {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo svg {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--fg);
  }

  .logo-text span {
    color: var(--accent);
  }

  /* ── Status badge ── */
  .status-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--muted);
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.online  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.offline { background: var(--danger); }

  /* ── Section ── */
  .section {
    margin-bottom: 32px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Add form ── */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .form-full {
    margin-bottom: 10px;
  }

  label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  input, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--fg);
    font-family: var(--font);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
    resize: none;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
  }

  input::placeholder, textarea::placeholder {
    color: var(--border);
  }

  textarea { height: 64px; }

  .form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  /* ── Buttons ── */
  button {
    font-family: var(--font);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    border: none;
    border-radius: var(--radius);
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: var(--accent-dim); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--fg); border-color: var(--fg); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid transparent;
    padding: 4px 8px;
    font-size: 11px;
  }
  .btn-danger:hover { background: rgba(239,68,68,0.1); border-color: var(--danger); }

  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    background: var(--bg);
  }

  th {
    padding: 9px 12px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(71,85,105,0.4);
    vertical-align: top;
    font-size: 12px;
    max-width: 0;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(255,255,255,0.02); }

  .col-channel  { width: 22%; }
  .col-schedule { width: 18%; }
  .col-message  { width: 38%; }
  .col-status   { width: 16%; }
  .col-actions  { width: 6%; text-align: right; }

  .cell-truncate {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .cell-channel {
    color: var(--accent);
    font-size: 11px;
  }

  .cell-schedule {
    color: var(--warn);
    font-size: 11px;
    white-space: nowrap;
  }

  .cell-message {
    color: var(--fg);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 60px;
    overflow: hidden;
  }

  .cell-status {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
  }

  .cell-status.posted {
    color: var(--accent);
  }

  /* ── Empty state ── */
  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
  }

  .empty-cat {
    font-size: 28px;
    margin-bottom: 8px;
    line-height: 1;
    /* using text since no emoji rule is for icons, cat here is decorative flavor */
    filter: grayscale(1);
    opacity: 0.4;
  }

  .empty p {
    font-size: 12px;
  }

  /* ── Loading ── */
  .loading-row td {
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 11px;
  }

  /* ── Toast ── */
  #toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 1000;
    pointer-events: none;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 11px;
    color: var(--fg);
    min-width: 200px;
    max-width: 320px;
    animation: slideIn 0.2s ease-out;
    pointer-events: auto;
  }

  .toast.success { border-left: 3px solid var(--accent); }
  .toast.error   { border-left: 3px solid var(--danger); }

  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  .toast.dying { animation: fadeOut 0.3s ease-in forwards; }

  /* ── Refresh bar ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .refresh-note {
    font-size: 10px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .col-status, .col-channel { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4 6 L4 18 Q4 24 10 24 L18 24 Q24 24 24 18 L24 10 L20 4 L16 8 L12 8 L8 4 Z" fill="#1E293B" stroke="#475569" stroke-width="1.2"/>
        <circle cx="10.5" cy="14" r="1.5" fill="#22C55E"/>
        <circle cx="17.5" cy="14" r="1.5" fill="#22C55E"/>
        <path d="M11 19 Q14 21 17 19" stroke="#475569" stroke-width="1" stroke-linecap="round" fill="none"/>
        <path d="M8 8 L6 4" stroke="#475569" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M12 8 L12 4" stroke="#475569" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M20 10 L24 8" stroke="#475569" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M20 14 L24 14" stroke="#475569" stroke-width="1" stroke-linecap="round" stroke-dasharray="1.5 2"/>
      </svg>
      <span class="logo-text">Tabby<span>Announce</span></span>
    </div>
    <div class="status-badge" id="status-badge" aria-live="polite">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">connecting...</span>
    </div>
  </header>

  <!-- Add form -->
  <div class="section">
    <div class="section-title">New Announcement</div>
    <div class="add-form">
      <div class="form-row">
        <div>
          <label for="f-channel">Channel ID or Link</label>
          <input id="f-channel" type="text" placeholder="123456789 or discord.com/channels/..." autocomplete="off">
        </div>
        <div>
          <label for="f-schedule">Schedule</label>
          <input id="f-schedule" type="text" placeholder="daily 9am · monday 1:30pm · 2026-12-25 12:00" autocomplete="off">
        </div>
      </div>
      <div class="form-full">
        <label for="f-message">Message Content</label>
        <textarea id="f-message" placeholder="What should the bot post?"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-ghost" id="btn-clear" type="button">Clear</button>
        <button class="btn-primary" id="btn-add" type="button">Add Announcement</button>
      </div>
    </div>
  </div>

  <!-- Schedule table -->
  <div class="section">
    <div class="toolbar">
      <div class="section-title" style="margin-bottom:0">Scheduled Announcements</div>
      <div class="refresh-note" id="refresh-note"></div>
    </div>
    <div class="table-wrap">
      <table aria-label="Scheduled announcements">
        <thead>
          <tr>
            <th class="col-channel">Channel</th>
            <th class="col-schedule">Schedule</th>
            <th class="col-message">Message</th>
            <th class="col-status">Last Sent</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody id="schedule-tbody">
          <tr class="loading-row"><td colspan="5">loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div id="toast-container" aria-live="polite"></div>

<script>
  // ── Helpers ──────────────────────────────────────────────

  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => {
      el.classList.add('dying');
      el.addEventListener('animationend', () => el.remove());
    }, 3500);
  }

  function truncateChannel(val) {
    if (!val) return '—';
    // Extract ID from link if present
    const m = val.match(/channels\/\d+\/(\d+)/);
    const id = m ? m[1] : val;
    return id.length > 20 ? id.slice(0, 18) + '…' : id;
  }

  function formatStatus(val) {
    if (!val) return { text: '—', cls: '' };
    // "Posted at 2026-06-18T09:00:00.000Z"
    const m = val.match(/Posted at (.+)/);
    if (m) {
      const d = new Date(m[1]);
      if (!isNaN(d)) {
        const rel = formatRelative(d);
        return { text: rel, cls: 'posted', title: d.toLocaleString() };
      }
    }
    return { text: val, cls: '' };
  }

  function formatRelative(date) {
    const diff = Date.now() - date.getTime();
    const mins  = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    const days  = Math.floor(diff / 86400000);
    if (mins < 1)    return 'just now';
    if (mins < 60)   return `${mins}m ago`;
    if (hours < 24)  return `${hours}h ago`;
    if (days < 7)    return `${days}d ago`;
    return date.toLocaleDateString();
  }

  // ── Status polling ────────────────────────────────────────

  async function pollStatus() {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      const dot  = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (d.online) {
        dot.className = 'status-dot online';
        text.textContent = d.tag + (d.jobs ? ` · ${d.jobs} job${d.jobs !== 1 ? 's' : ''}` : '');
      } else {
        dot.className = 'status-dot offline';
        text.textContent = 'offline';
      }
    } catch {
      document.getElementById('status-dot').className = 'status-dot offline';
      document.getElementById('status-text').textContent = 'unreachable';
    }
  }

  // ── Load schedules ────────────────────────────────────────

  async function loadSchedules() {
    const tbody = document.getElementById('schedule-tbody');
    try {
      const r = await fetch('/api/schedules');
      if (!r.ok) throw new Error(await r.text());
      const rows = await r.json();

      const note = document.getElementById('refresh-note');
      note.textContent = `refreshed ${new Date().toLocaleTimeString()}`;

      if (rows.length === 0) {
        tbody.innerHTML = `
          <tr><td colspan="5">
            <div class="empty">
              <div class="empty-cat">=^..^=</div>
              <p>No announcements yet. Add one above.</p>
            </div>
          </td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(row => {
        const ch = truncateChannel(row.channel);
        const sch = row.schedule || '—';
        const msg = row.message ? row.message.replace(/</g, '&lt;') : '—';
        const { text: statusText, cls: statusCls, title: statusTitle } = formatStatus(row.status);
        return `
          <tr data-row="${row.rowNumber}">
            <td class="col-channel"><div class="cell-truncate cell-channel" title="${(row.channel||'').replace(/"/g,'&quot;')}">${ch}</div></td>
            <td class="col-schedule"><span class="cell-schedule">${sch}</span></td>
            <td class="col-message"><div class="cell-message">${msg}</div></td>
            <td class="col-status"><span class="cell-status ${statusCls}" title="${statusTitle||''}">${statusText}</span></td>
            <td class="col-actions">
              <button class="btn-danger" aria-label="Delete row ${row.rowNumber}" onclick="deleteRow(${row.rowNumber}, this)">del</button>
            </td>
          </tr>`;
      }).join('');
    } catch (e) {
      tbody.innerHTML = `<tr class="loading-row"><td colspan="5">error: ${e.message}</td></tr>`;
      toast('Failed to load schedules', 'error');
    }
  }

  // ── Add ───────────────────────────────────────────────────

  document.getElementById('btn-add').addEventListener('click', async () => {
    const channel  = document.getElementById('f-channel').value.trim();
    const schedule = document.getElementById('f-schedule').value.trim();
    const message  = document.getElementById('f-message').value.trim();

    if (!channel || !schedule || !message) {
      toast('Fill in all three fields', 'error');
      return;
    }

    const btn = document.getElementById('btn-add');
    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      const r = await fetch('/api/schedules', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ channel, schedule, message }),
      });
      if (!r.ok) {
        const d = await r.json();
        throw new Error(d.error || r.statusText);
      }
      document.getElementById('f-channel').value  = '';
      document.getElementById('f-schedule').value = '';
      document.getElementById('f-message').value  = '';
      toast('Announcement added');
      loadSchedules();
    } catch (e) {
      toast(`Add failed: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Announcement';
    }
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    document.getElementById('f-channel').value  = '';
    document.getElementById('f-schedule').value = '';
    document.getElementById('f-message').value  = '';
  });

  // ── Delete ────────────────────────────────────────────────

  async function deleteRow(rowNumber, btn) {
    if (!confirm('Delete this announcement?')) return;
    btn.disabled = true;
    btn.textContent = '...';
    try {
      const r = await fetch(`/api/schedules/${rowNumber}`, { method: 'DELETE' });
      if (!r.ok) {
        const d = await r.json();
        throw new Error(d.error || r.statusText);
      }
      const row = document.querySelector(`tr[data-row="${rowNumber}"]`);
      if (row) row.remove();
      toast('Announcement deleted');
      // Re-render in case table is now empty
      loadSchedules();
    } catch (e) {
      toast(`Delete failed: ${e.message}`, 'error');
      btn.disabled = false;
      btn.textContent = 'del';
    }
  }

  // ── Init ──────────────────────────────────────────────────

  pollStatus();
  setInterval(pollStatus, 10000);

  loadSchedules();
  setInterval(loadSchedules, 30000);
</script>
</body>
</html>
